{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Database Explorer</h1>
        <p class="page-desc">Raw SQL table views for root administration mapping.</p>
    </div>
</div>

<div class="card">
    <div style="display:flex;gap:12px;margin-bottom:20px;overflow-x:auto;padding-bottom:10px;">
        <button class="btn btn-outline" onclick="loadTable('users')">Users</button>
        <button class="btn btn-outline" onclick="loadTable('customers')">Customers</button>
        <button class="btn btn-outline" onclick="loadTable('providers')">Providers</button>
        <button class="btn btn-outline" onclick="loadTable('delivery_agents')">Delivery</button>
        <button class="btn btn-outline" onclick="loadTable('meals')">Meals</button>
        <button class="btn btn-outline" onclick="loadTable('orders')">Orders</button>
        <button class="btn btn-outline" onclick="loadTable('reviews')">Reviews</button>
        <button class="btn btn-outline" onclick="loadTable('payments')">Payments</button>
    </div>

    <h3 id="current-table-title" style="margin-bottom:16px;color:var(--admin-primary);text-transform:capitalize;">Select a Table</h3>
    
    <div class="table-responsive">
        <table class="data-table">
            <thead id="db-head">
                <tr><th>Columns will appear here</th></tr>
            </thead>
            <tbody id="db-body">
                <tr><td style="text-align:center;color:var(--admin-text-muted)">Awaiting table selection...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadTable(tableName) {
        document.getElementById('current-table-title').textContent = `Table: ${tableName}`;
        const thead = document.getElementById('db-head');
        const tbody = document.getElementById('db-body');
        
        thead.innerHTML = '<tr><th>Loading schema...</th></tr>';
        tbody.innerHTML = '';
        
        try {
            const res = await fetch(`/api/admin/database/${tableName}`);
            if(res.ok) {
                const data = await res.json();
                const rows = data.rows;
                
                if (rows.length === 0) {
                    thead.innerHTML = '<tr><th>No Data</th></tr>';
                    tbody.innerHTML = `<tr><td style="text-align:center;color:var(--admin-text-muted)">The ${tableName} table is currently empty.</td></tr>`;
                    return;
                }

                // Create headers
                let columns = Object.keys(rows[0]);
                thead.innerHTML = '<tr>' + columns.map(c => `<th>${c.replace(/_/g, ' ')}</th>`).join('') + '</tr>';
                
                // Create rows
                rows.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = columns.map(c => {
                        let val = r[c] === null ? '<em>NULL</em>' : r[c];
                        // Security: visually obscure password hashes in DB view if returned
                        if(c === 'hashed_password' || c === 'password') val = '<i>****************</i>';
                        return `<td>${val}</td>`;
                    }).join('');
                    tbody.appendChild(tr);
                });
            } else {
                thead.innerHTML = '<tr><th>Error</th></tr>';
                tbody.innerHTML = `<tr><td style="color:var(--danger)">Failed to load table or access denied.</td></tr>`;
            }
        } catch(e) {
            console.error("Database view error", e);
        }
    }

    // Default load users
    loadTable('users');
</script>
{% endblock %}
