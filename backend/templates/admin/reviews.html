{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Reviews & Moderation</h1>
        <p class="page-desc">Monitor platform sentiment and remove abusive content.</p>
    </div>
</div>

<div class="card">
    <div class="table-responsive">
        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Provider</th>
                    <th>Rating</th>
                    <th>Comment</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="reviews-body">
                <tr><td colspan="7" style="text-align:center;color:var(--admin-text-muted)">Loading platform reviews...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadReviews() {
        try {
            const res = await fetch('/api/admin/reviews');
            if(res.ok) {
                const reviews = await res.json();
                const tbody = document.getElementById('reviews-body');
                tbody.innerHTML = '';
                
                if (reviews.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--admin-text-muted)">No reviews exist on the platform.</td></tr>';
                    return;
                }

                reviews.forEach(r => {
                    let stars = '';
                    for (let i = 1; i <= 5; i++) {
                        stars += `<i class="fa fa-star" style="color:${i <= r.rating ? 'var(--admin-accent)' : 'var(--admin-border)'}"></i>`;
                    }

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><small>#${r.id}</small></td>
                        <td>${r.customer}</td>
                        <td>${r.provider}</td>
                        <td style="min-width:100px;">${stars}</td>
                        <td style="max-width:300px;"><strong>"</strong>${r.comment || '<i>No text</i>'}<strong>"</strong></td>
                        <td><small>${new Date(r.created_at).toLocaleDateString()}</small></td>
                        <td>
                            <button class="btn btn-sm btn-outline" style="color:var(--danger)" onclick="deleteReview(${r.id})"><i class="fa fa-trash"></i> Remove</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        } catch(e) { console.error("Error fetching reviews", e); }
    }

    async function deleteReview(id) {
        if(!confirm("Are you sure you want to delete this review? This action cannot be undone.")) return;
        try {
            const res = await fetch(`/api/admin/reviews/${id}`, { method: 'DELETE' });
            if(res.ok) {
                showToast("Review successfully removed.", "success");
                loadReviews();
            }
        } catch(e) {
            showToast("Failed to delete review", "error");
        }
    }

    loadReviews();
</script>
{% endblock %}
